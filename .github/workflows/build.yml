name: Build and push devcontainer images

on:
  push:
    branches: [main]
    paths:
      - base/Dockerfile
      - flavour/Dockerfile
      - flavours/**/pixi.toml
      - .github/workflows/build.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: jesserobertson

jobs:
  build-bases:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: base-ubuntu
            base_image: ubuntu:24.04
            tags: ghcr.io/jesserobertson/base-ubuntu:latest
          - name: base-cuda
            base_image: nvidia/cuda:12.8.0-devel-ubuntu24.04
            tags: |
              ghcr.io/jesserobertson/base-cuda:latest
              ghcr.io/jesserobertson/base-cuda:cuda12.8.0
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: base
          push: true
          build-args: BASE_IMAGE=${{ matrix.base_image }}
          tags: ${{ matrix.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  build-flavours:
    name: ${{ matrix.name }}
    needs: build-bases
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        name: [rapids, mojo, jax, pytorch]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: flavours/${{ matrix.name }}
          file: flavour/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
