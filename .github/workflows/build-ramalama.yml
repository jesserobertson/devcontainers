name: Build and push ramalama image

on:
  push:
    branches: [main]
    paths:
      - ramalama/Dockerfile
      - .github/workflows/build-ramalama.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: jesserobertson

jobs:
  build-ramalama:
    name: ramalama
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ramalama
          push: true
          tags: ghcr.io/jesserobertson/ramalama:latest
          cache-from: type=gha,scope=ramalama
          cache-to: type=gha,mode=max,scope=ramalama
