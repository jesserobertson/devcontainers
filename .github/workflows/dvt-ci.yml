name: dvt CI

on:
  push:
    branches: [main]
    paths:
      - "dvt/**"
      - ".github/workflows/dvt-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "dvt/**"
      - ".github/workflows/dvt-ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: dvt
    steps:
      - uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          manifest-path: dvt/pyproject.toml
          environments: dev

      - name: Run quality checks
        run: pixi run -e dev quality check

      - name: Run tests
        run: pixi run -e dev test all

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dvt
    steps:
      - uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          manifest-path: dvt/pyproject.toml
          environments: docs

      - name: Build docs
        run: pixi run -e docs docs build --strict
