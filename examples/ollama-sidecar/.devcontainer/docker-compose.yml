services:
  app:
    image: ghcr.io/jesserobertson/base-cuda:latest
    volumes:
      - ..:/workspace:cached
      - pixi-cache:/home/dev/.cache/pixi
    command: sleep infinity
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama:
    image: ollama/ollama:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ollama-models:/root/.ollama

volumes:
  pixi-cache:
  ollama-models:
