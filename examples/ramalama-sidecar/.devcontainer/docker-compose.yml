services:
  app:
    image: ghcr.io/jesserobertson/base-cuda:latest
    volumes:
      - ..:/workspace:cached
      - pixi-cache:/root/.cache/pixi
    command: sleep infinity
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ramalama:
    image: ghcr.io/jesserobertson/ramalama:latest
    environment:
      - RAMALAMA_MODEL=ollama://llama3.2
      - RAMALAMA_PORT=8080
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ramalama-models:/root/.local/share/ramalama

volumes:
  pixi-cache:
  ramalama-models:
