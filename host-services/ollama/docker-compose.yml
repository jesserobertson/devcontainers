services:
  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-latest}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    volumes:
      - ollama-models:/root/.ollama

volumes:
  ollama-models:
